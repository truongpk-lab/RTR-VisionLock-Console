app:
  name: RTR VisionLock Console
  mode: omni_watch

camera:
  source: 0
  width: 1280
  height: 720
  fps: 30
  # Pixel format requested from the device. MJPG lets a USB webcam stream
  # compressed at full rate; the uncompressed default (YUYV) caps 720p at a few
  # FPS and is the usual cause of low capture throughput. Set "" to leave as-is.
  fourcc: MJPG
  # Capture runs on its own thread and keeps only the newest frame, so frames
  # buffered while processing was busy are dropped automatically (flat latency).
  # Imported video files normally play at their native FPS. Set true to drop that
  # pacing and run the loop at full pipeline speed -- a throughput benchmark.
  uncap_fps: false

models:
  proposal:
    # Primary detector for Jetson deployment. Export the fine-tuned YOLO11n
    # model to TensorRT FP16 at backend/models/yolo11n_custom.engine. If the
    # engine or optional runtime package is unavailable, the backend falls back
    # to the OpenCV contour proposer so development machines still run.
    type: yolo11_trt
    path: models/yolo11n_custom.engine
    input_size: 640
    conf: 0.35
    iou: 0.50
    class_names: []
    enabled: true
  segmenter:
    # Promptable target refinement. Prefer SAM2.1 Hiera Tiny for Jetson GPU
    # deployment; fall back to SAM ONNX/GrabCut when optional models are absent.
    type: sam2
    checkpoint: models/sam2.1_hiera_tiny.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
    encoder_path: models/mobile_sam_encoder.onnx
    decoder_path: models/mobile_sam_decoder.onnx
    input_size: 1024
    enabled: true
  # Tier A normal tracker: UETrack (CVPR 2026). Prefer the S/T (small/tiny)
  # variant exported to TensorRT for the >=60 FPS target on Jetson AGX (the B
  # variant is more accurate but heavier). Clone the repo on-device, point
  # repo_path at it, and verify the exact variant/param name in the fork. Missing
  # torch/repo/weights => the backbone reports unavailable and falls back to OpenCV.
  tracker_uetrack:
    enabled: true
    repo_path: ""                  # absolute path to the cloned UETrack repo
    checkpoint: models/uetrack_tiny.pth
    param_module: lib.test.parameter.uetrack
    tracker_module: lib.test.tracker.uetrack
    tracker_class: UETrack
    param_name: uetrack_tiny       # experiments/uetrack/<name>.yaml: tiny/small/base
  # Optional accelerator: the UETrack network exported to ONNX and run via ONNX
  # Runtime (TensorRT/CUDA EP builds & caches a per-device engine on first run).
  # Build the .onnx once with tools/export_uetrack_onnx.py, then select it with
  # tracking.normal_backbone: uetrack_onnx. Reuses the SAME repo for crop/decode
  # pre/post. Missing onnxruntime/.onnx => falls back to OpenCV, so it stays opt-in.
  tracker_uetrack_onnx:
    enabled: true
    repo_path: ""                  # same cloned UETrack repo (reused for pre/post)
    checkpoint: models/uetrack_tiny_rgb.pth
    onnx_path: models/uetrack_tiny_rgb.onnx
    param_name: uetrack_tiny_rgb
    fp16: true                     # TensorRT EP FP16 (2-4x on Jetson)
    engine_cache_dir: models/trt_cache
    # Jetson order; on a CPU-only onnxruntime the unavailable EPs are skipped.
    providers: [TensorrtExecutionProvider, CUDAExecutionProvider, CPUExecutionProvider]

selection:
  # YOLO-first selection is the default: detector boxes are shown first, then
  # the selected box is refined by SAM2/SAM/GrabCut before learning starts.
  mode: yolo
  tracker:
    type: opencv_csrt
    path: null
    input_size: 224
  embedding:
    type: hsv_shape
    path: null
  text_guided:
    type: yoloe
    path: null
    enabled: false

thresholds:
  stable_threshold: 0.70
  # Hysteresis on STABLE: once locked STABLE, only drop to UNCERTAIN when the score
  # falls below stable_threshold - this. Stops STABLE<->UNCERTAIN flapping when the
  # score hovers near 0.70. 0 = hard threshold (old behaviour).
  stable_hysteresis: 0.08
  uncertain_threshold: 0.45
  lost_frames: 5
  reacquire_threshold: 0.62
  memory_update_threshold: 0.78
  kalman_max_error: 80
  min_similarity: 0.55
  # Consecutive ok frames with identity < min_similarity (tracker stuck on the
  # wrong object) tolerated inside UNCERTAIN before forcing LOST -> global
  # re-detect. ~0.4s @30fps; larger than lost_frames because this is a soft loss.
  identity_lost_frames: 12
  mask_iou_threshold: 0.50
  # Motion-consistency above this is treated as "calm" for adaptive SAM2 refine.
  stable_motion: 0.70
  # Honest confidence for the OpenCV fallback tracker. OpenCV has no real score
  # (flat affinity=1.0) and the jitter signal is fooled by SMOOTH drift, so when
  # the active backbone is the fallback we estimate confidence from the signals
  # that actually catch drift (appearance identity + bbox stability) and cap it so
  # a fallback can never hold STABLE on ok=True alone.
  negative_penalty_weight: 0.25   # subtracted from track_score per negative similarity
  fallback_confidence_cap: 0.75   # hard ceiling on fallback tracker confidence
  fallback_identity_weight: 0.6   # weight of identity in the fallback estimate
  fallback_stability_weight: 0.4  # weight of jitter-stability in the fallback estimate
  # Ceiling on confidence for a tracker that reports a flat affinity=1.0 (SAM2
  # mask, or a deep tracker whose fork omits a score key): jitter-stability alone
  # saturates near 1.0 on any locally smooth box, so it must not buy a full STABLE.
  flat_confidence_cap: 0.85

runtime:
  device: cuda
  precision: fp16
  detector_interval: 5
  # After lock the detector is OFF (run only by global re-detect when LOST). SAM2
  # mask refine during live tracking is OFF by default too (init-only) to protect
  # the >=60 FPS budget and avoid a second algorithm fighting the tracker.
  refine_during_tracking: false
  sam_refine_interval: 8
  # Adaptive SAM2 refine: when Kalman motion is calm we stretch the refine cadence
  # to stable_refine_interval; under shaky motion we fall back to sam_refine_interval.
  adaptive_refine: true
  stable_refine_interval: 30
  max_sam_candidates: 3
  max_candidates: 20
  # Cap live mini-trackers during candidate selection and refresh boxes by
  # re-detecting periodically instead of running one tracker per candidate/frame.
  max_candidate_trackers: 6
  candidate_redetect_interval: 15
  # Stream a downscaled JPEG to the UI (processing stays full-res).
  stream_max_width: 960
  stream_jpeg_quality: 70
  skip_old_frames: true
  queue_size: 2

tracking:
  # 2-tier confidence-gated tracking layer (LTMU-style meta-updater), see
  # app/vision/policy.py. The local backbone is selected by name from
  # app/vision/backbones and falls back to OpenCV when a deep engine is absent,
  # so a dev box without torch still runs end-to-end.
  #   confidence HIGH/LOW -> normal_backbone (Tier A, local track; re-searches itself)
  #   target LOST         -> global YOLO+ReID re-detect (Tier C, reacquire_threshold)
  normal_backbone: uetrack
  # The deep backbone is built ONCE and re-seeded on every (re)lock (no rebuild ->
  # no transition freeze). If it ever drops to the OpenCV fallback mid-stream, the
  # next re-lock tries one rebuild to recover the deep tracker. Set false to stay on
  # OpenCV after a drop (avoids repeated rebuild cost if the deep engine is broken).
  recover_deep_on_relock: true
  # Free GPU memory when the camera stops by tearing the backbone down. Default keeps
  # it warm so the next start + lock has no engine-build stall.
  teardown_on_stop: false

motion:
  # Camera ego-motion compensation: sparse LK optical flow on background features
  # (target masked out) feeds a global (tx,ty) into the EKF gate so camera
  # shake/pan is not mistaken for target drift. Pure cv2 CPU; enabled:false
  # restores the plain constant-velocity behaviour. See app/vision/flow.py + ekf.py.
  camera:
    enabled: true
    flow_downscale: 0.5            # run flow at half resolution (cheaper)
    max_features: 200             # goodFeaturesToTrack cap
    flow_interval: 1              # compute flow every Nth tracking frame
    feature_quality: 0.01
    feature_min_distance: 8
    target_mask_margin: 0.2       # dilate target bbox before excluding it from flow
    min_inliers: 12               # below this -> ok=false (gate falls back)
    min_inlier_ratio: 0.5         # below this -> drop ego-motion input (moving distractor dominates flow)
    lk_win: 21
  ekf:
    q_pos: 1.0                    # process noise: center position
    q_vel: 4.0                    # process noise: center velocity (target maneuver)
    q_size: 0.5                   # process noise: w/h random walk
    r_pos: 4.0                    # measurement noise: center
    r_size: 9.0                   # measurement noise: w/h

sam2:
  video_memory_window: 16
  negative_prompt_radius: 2.5

samurai:
  # SAMURAI motion-aware tracking (https://github.com/yangchris11/samurai).
  # use_video_predictor turns on the streaming SAM2 video backbone (needs a
  # streaming-capable SAM2 build + GPU); OFF falls back to the OpenCV backbone
  # with SAM2 used only for periodic refine. Verify on-device before enabling.
  use_video_predictor: false
  # alpha_kf weights Kalman-motion agreement vs raw mask affinity when SAM2 emits
  # multiple masks; distractor_penalty subtracts overlap with known negatives.
  alpha_kf: 0.25
  distractor_penalty: 0.25
  memory_admission:
    # Motion-aware memory selection: a frame is written to the appearance bank
    # only if it clears every gate, so a passing look-alike cannot poison the lock.
    min_affinity: 0.50
    min_positive: 0.60
    max_negative: 0.50
    min_motion: 0.50
    min_margin: 0.10

identity:
  # Pluggable appearance encoder (see app/vision/encoders.py). Default is a
  # handcrafted spatial-colour + texture feature that separates similar objects
  # far better than a global histogram, still CPU-only/Jetson-cheap. Use
  # encoder: hsv_shape for the original lighter global histogram.
  encoder: hsv_block_texture
  min_margin: 0.12
  negative_slots: 8
  # Deep ReID identity is the per-frame cost. Run the full identity score every Nth
  # tracking frame (1 = every frame, unchanged); between, reuse the cached score and
  # skip memory writes. Drift is then re-checked at most reid_interval frames later.
  reid_interval: 1
  # Always run a fresh score when not STABLE, so a confidence dip re-confirms identity
  # immediately instead of waiting for the cadence.
  reid_on_uncertain: true
  # Optional deep ReID embedding to separate genuine look-alikes. Set
  # encoder: fused to enable (needs the ONNX model below + onnxruntime, which is
  # in the base install). Missing model -> automatic fallback to the handcrafted
  # encoder, so the default stays CPU-light and dependency-free. Export OSNet
  # (e.g. osnet_x0_25) to ONNX once with boxmot/torchreid; same file runs CPU on
  # dev and TensorRT/CUDA on Jetson by switching providers.
  deep:
    model_path: models/osnet_x0_25.onnx
    input_size: [256, 128]            # H, W (OSNet)
    providers: [CPUExecutionProvider] # Jetson: [TensorrtExecutionProvider, CUDAExecutionProvider, CPUExecutionProvider]
    fast_weight: 0.45
    deep_weight: 0.45

reacquire:
  identity_weight: 0.45
  motion_weight: 0.25
  detector_weight: 0.15
  mask_weight: 0.15
  # "Find that label again": narrow global re-detection to the locked target's
  # class before ranking by appearance/motion, so look-alikes of other classes are
  # never considered. Needs a labelled detector (COCO yolo11n / yolo11n-seg). When
  # the class is unknown or no same-class candidate is present, falls back to all.
  match_label: true
  # Global re-detection (Tier C) runs only when LOST, at low frequency, and must
  # confirm a candidate over several consecutive, spatially-consistent frames
  # (matched to the long-term anchor) before re-locking — no single-frame flapping.
  detect_hz: 3                  # global detector cadence while LOST (2-5 Hz)
  confirm_frames: 3             # consecutive confirmations required before re-lock
  confirm_iou_gate: 0.3         # spatial consistency between confirmation frames
  confirm_max_gap: 1            # tolerated misses without losing the streak
  # A confirmation also counts if EITHER the centres are within
  # confirm_center_gate_scale*box (fast motion, IoU~0) OR appearance reid_score
  # >= confirm_identity_gate (same target, moved far). 0 / 1.01 disable each.
  confirm_center_gate_scale: 1.5
  confirm_identity_gate: 0.82
  # Instant re-lock fast-path: a candidate that already passed the anchor+strength
  # gate AND has reid_score >= fast_relock_identity, within fast_relock_max_age
  # seconds of loss (motion still corroborates position), re-locks on a single
  # detection instead of accumulating the confirmation streak. Default 1.01 = OFF
  # (no single value can reach it) so the portable default keeps the multi-frame
  # confirmation; enable per-box in local.yaml (e.g. 0.9).
  fast_relock_identity: 1.01
  fast_relock_max_age: 2.0
  # Parallel confirmation hypotheses kept while re-detecting, so a consistent
  # runner-up is not wiped each frame by the detector's top pick. 1 = single
  # hypothesis (original behaviour); 2-3 is a good range when distractors appear.
  top_k: 2
  learn_distractors: true       # add rejected look-alikes to the negative bank
  distractor_min_score: 0.5     # min detector score to bother learning a distractor
  # Dynamic re-acquire scoring: as the loss ages, trust motion less and identity
  # more. lost_short/lost_long (seconds) pick which weight tier applies. A far-away
  # re-appearance after a long loss is then re-locked on appearance, not penalised
  # for being far from the stale Kalman prediction.
  lost_short_sec: 1.0
  lost_long_sec: 3.0
  detect_hz_long: 1             # slower full-frame cadence once lost beyond lost_long_sec
  weights_early:                # < lost_short_sec: still trust motion
    identity_weight: 0.40
    motion_weight: 0.30
    detector_weight: 0.15
    mask_weight: 0.15
  weights_mid:                  # lost_short..lost_long: balanced (matches static)
    identity_weight: 0.45
    motion_weight: 0.25
    detector_weight: 0.15
    mask_weight: 0.15
  weights_late:                 # > lost_long_sec: motion ~0, identity dominates
    identity_weight: 0.65
    motion_weight: 0.0
    detector_weight: 0.20
    mask_weight: 0.15

learning:
  duration_sec: 2.5
  min_samples: 8
  max_samples: 20
  quality_threshold: 80.0
  # Mask-aware appearance: every Nth harvested sample is refined with SAM2 to get
  # this frame's foreground mask, so shadow/road inside the box is excluded from
  # the colour/deep template. Per-frame refine is too heavy (SAM2 set_image), so
  # only ~max_samples/N refines run during the brief learning window. Needs the
  # SAM2 backend; otherwise samples are box-only (mask=None) as before.
  mask_refine_every: 4

memory:
  base_id_prefix: TGT
  feature_dim: 1026
  # Three positive tiers (see app/vision/memory.py): ram=short-term (every
  # admitted STABLE frame), wrm=working-term (periodic promotion), drm=long-term
  # identity ANCHOR (seeded at lock, consolidated rarely; global Re-ID matches it).
  ram_slots: 8
  wrm_slots: 8
  drm_slots: 8
  negative_slots: 8
  working_promote_every: 12      # admitted frames between working-tier promotions
  long_term_min_margin: 0.25     # stricter gate to consolidate into the anchor
  update_method: ema
  ema_alpha: 0.15

ui:
  theme: dark
  show_masks: true
  show_candidates: true
  show_kalman_region: false
  log_max_lines: 500
